<div class="card">
    <div class="card-body">
        <h3 class="text-center p-3 bg-primary">{{isInEditMode ? 'Update Student' : 'Add Student'}}</h3>
        <form #StudentForm="ngForm" (ngSubmit)="onstdsubmit()">
            <div class="form-group">
                <label for="fname">First Name</label>
                <input type="text" ngModel #fname="ngModel" name="fname" required class="form-control">
            </div>
              <div class="form-group">
                <label for="lname">Last Name</label>
                <input type="text" ngModel #lname="ngModel" name="lname" required class="form-control">
            </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="text" ngModel #email="ngModel" name="email" required class="form-control">
            </div>
              <div class="form-group">
                <label for="isActive">Is Active</label>
                <select ngModel #isActive="ngModel" name="isActive" required class="form-control">
                    <option [ngValue]="true">yes</option>
                    <option [ngValue]="false">No</option>
                </select>
            </div>
              <div class="form-group">
                <label for="contact">Contact</label>
                <input type="text" ngModel #contact="ngModel" name="contact" required class="form-control">
            </div>
            <div class="form-group">
                <button *ngIf="!isInEditMode" mat-raised-button color="primary" class="w-100">Add Student</button>
                <button (click)="onUpdate()" *ngIf="isInEditMode" mat-raised-button color="primary" class="w-100">Update Student</button>
            </div>

        </form>
    </div>
</div>
